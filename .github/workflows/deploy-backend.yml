name: Deploy Backend & WireGuard

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'wireguard-gateway/**'
      - 'docker-compose.prod.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy-backend.yml'

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  WIREGUARD_IMAGE: ghcr.io/${{ github.repository }}/wireguard-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./wireguard-gateway
          push: true
          tags: |
            ${{ env.WIREGUARD_IMAGE }}:${{ github.sha }}
            ${{ env.WIREGUARD_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /root/vpngod/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            mkdir -p /root/vpngod
            cd /root/vpngod

            # Generate secrets on first deploy
            if [ ! -f .env ]; then
              printf "POSTGRES_PASSWORD=%s\nJWT_SECRET=%s\n" \
                "$(openssl rand -base64 24)" \
                "$(openssl rand -base64 32)" > .env
            fi

            # Clean up old images before pulling new ones
            docker image prune -af

            docker compose -f docker-compose.prod.yml pull backend wireguard
            docker compose -f docker-compose.prod.yml up -d

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *Backend & WireGuard* deployed successfully%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          else
            MESSAGE="❌ *Backend & WireGuard* deploy failed%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
