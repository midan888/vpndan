name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build with no Docker cache'
        required: false
        type: boolean
        default: false

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run tests
        working-directory: backend
        run: go test ./... -v -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          no-cache: ${{ inputs.no_cache == true }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /root/vpndan/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            mkdir -p /root/vpndan
            cd /root/vpndan

            # Generate secrets on first deploy
            if [ ! -f .env ]; then
              printf "POSTGRES_PASSWORD=%s\nJWT_SECRET=%s\n" \
                "$(openssl rand -base64 24)" \
                "$(openssl rand -base64 32)" > .env
            fi

            # Clean up old images before pulling new ones
            docker image prune -af

            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *Backend* deployed successfully%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          else
            MESSAGE="❌ *Backend* deploy failed%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
