name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build with no Docker cache'
        required: false
        type: boolean
        default: false

env:
  WEBSITE_IMAGE: ghcr.io/${{ github.repository }}/website

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./website
          push: true
          no-cache: ${{ inputs.no_cache == true }}
          tags: |
            ${{ env.WEBSITE_IMAGE }}:${{ github.sha }}
            ${{ env.WEBSITE_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /root/vpndan/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 103.63.30.69
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /root/vpndan

            docker compose -f docker-compose.prod.yml pull website
            docker compose -f docker-compose.prod.yml up -d website
            docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *Website* deployed successfully%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          else
            MESSAGE="❌ *Website* deploy failed%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
