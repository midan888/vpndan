name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 31.220.4.216
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /root/vpngod/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 31.220.4.216
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            mkdir -p /root/vpngod
            cd /root/vpngod

            # Generate secrets on first deploy
            if [ ! -f .env ]; then
              printf "POSTGRES_PASSWORD=%s\nJWT_SECRET=%s\n" \
                "$(openssl rand -base64 24)" \
                "$(openssl rand -base64 32)" > .env
            fi

            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *VPN God* deployed successfully%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          else
            MESSAGE="❌ *VPN God* deploy failed%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
