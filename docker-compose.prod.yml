services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vpndan
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  wireguard:
    image: ghcr.io/midan888/vpndan/wireguard-gateway:latest
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
    environment:
      WG_ADDRESS: 10.0.0.1/24
      WG_LISTEN_PORT: "51820"
      WG_ADMIN_ADDR: 0.0.0.0:9080
      # Amnezia WireGuard obfuscation params — must match values in the database
      AWG_JC: ${AWG_JC:-4}
      AWG_JMIN: ${AWG_JMIN:-40}
      AWG_JMAX: ${AWG_JMAX:-70}
      AWG_S1: ${AWG_S1:-0}
      AWG_S2: ${AWG_S2:-0}
      AWG_H1: ${AWG_H1:-1928394756}
      AWG_H2: ${AWG_H2:-3847291056}
      AWG_H3: ${AWG_H3:-2938475610}
      AWG_H4: ${AWG_H4:-1029384756}
    cap_add:
      - NET_ADMIN
    volumes:
      - /dev/net/tun:/dev/net/tun
      - wireguard_config:/config
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"

  backend:
    image: ghcr.io/midan888/vpndan/backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/vpndan?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      WIREGUARD_ADMIN_URL: http://wireguard:9080
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      wireguard:
        condition: service_started

  admin:
    image: ghcr.io/midan888/vpndan/admin:latest
    restart: unless-stopped
    depends_on:
      - backend

  website:
    image: ghcr.io/midan888/vpndan/website:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  seed-geoip:
    image: ghcr.io/midan888/vpndan/backend:latest
    command: ["seed-geoip"]
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/vpndan?sslmode=disable
      COUNTRIES: ${GEOIP_COUNTRIES:-}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  wireguard_config:
