# Central API stack — runs on the main server.
# Nodes (WireGuard + node-agent) are deployed separately via docker-compose.node.yml.

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vpndan
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  backend:
    image: ghcr.io/midan888/vpndan/backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/vpndan?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_SECRET: ${NODE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: ghcr.io/midan888/vpndan/admin:latest
    restart: unless-stopped
    depends_on:
      - backend

  website:
    image: ghcr.io/midan888/vpndan/website:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  seed-geoip:
    image: ghcr.io/midan888/vpndan/backend:latest
    command: ["seed-geoip"]
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/vpndan?sslmode=disable
      COUNTRIES: ${GEOIP_COUNTRIES:-}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
  caddy_data:
  caddy_config:
