name: VPNDan
options:
  bundleIdPrefix: com.vpndan
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 9NA5KSNXGN
    CODE_SIGN_STYLE: Automatic

packages:
  WireGuardKit:
    path: ../amneziawg-apple

targets:
  VPNDan:
    type: application
    platform: iOS
    attributes:
      DevelopmentTeam: 9NA5KSNXGN
      ProvisioningStyle: Automatic
    sources:
      - VPNDan
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vpndan.VPNDan
        INFOPLIST_FILE: VPNDan/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: VPNDan/App/VPNDan.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: VPNDan/App/VPNDan.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vpndan.VPNDan
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
    info:
      path: VPNDan/App/Info.plist
      properties:
        CFBundleName: VPN Dan
        CFBundleDisplayName: VPN Dan
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        API_BASE_URL: $(API_BASE_URL)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
    postCompileScripts:
      - script: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
        name: Set Build Number from Git
    dependencies:
      - target: PacketTunnel

  PacketTunnel:
    type: app-extension
    platform: iOS
    attributes:
      DevelopmentTeam: 9NA5KSNXGN
      ProvisioningStyle: Automatic
    sources:
      - PacketTunnel
    configFiles:
      Debug: PacketTunnel/PacketTunnel.xcconfig
      Release: PacketTunnel/PacketTunnel.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vpndan.VPNDan.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        LIBRARY_SEARCH_PATHS: $(inherited)
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vpndan.VPNDan
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleName: PacketTunnel
        CFBundleDisplayName: PacketTunnel
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    postCompileScripts:
      - script: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
        name: Set Build Number from Git
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
