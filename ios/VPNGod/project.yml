name: VPNGod
options:
  bundleIdPrefix: com.vpngod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  WireGuardKit:
    path: ../wireguard-apple

targets:
  VPNGod:
    type: application
    platform: iOS
    sources:
      - VPNGod
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vpngod.VPNGod
        INFOPLIST_FILE: VPNGod/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: VPNGod/App/VPNGod.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: VPNGod/App/VPNGod.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vpngod.VPNGod
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
    info:
      path: VPNGod/App/Info.plist
      properties:
        CFBundleName: VPN God
        CFBundleDisplayName: VPN God
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
    dependencies:
      - target: PacketTunnel

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - PacketTunnel
    configFiles:
      Debug: PacketTunnel/PacketTunnel.xcconfig
      Release: PacketTunnel/PacketTunnel.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vpngod.VPNGod.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vpngod.VPNGod
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleName: PacketTunnel
        CFBundleDisplayName: PacketTunnel
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
